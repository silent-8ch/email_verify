spring.application.name=email_verify

# Email Configuration - using console for demo testing
# You can replace this with your actual email provider (Gmail, Mailgun, SendGrid, etc.)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=demo
spring.mail.password=demo
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

